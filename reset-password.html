<!DOCTYPE html>
<html lang="en" style="background:#0a0a0a">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>Reset Password — FORGE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--surface:#111111;--border:#222222;--accent:#e8ff3d;--text:#f0f0f0;--muted:#666666;--red:#ff4444}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 28px;max-width:400px;width:100%;position:relative}
.card::before{content:'';position:absolute;top:-1px;left:-1px;width:20px;height:20px;border-top:2px solid var(--accent);border-left:2px solid var(--accent)}
.card::after{content:'';position:absolute;bottom:-1px;right:-1px;width:20px;height:20px;border-bottom:2px solid var(--accent);border-right:2px solid var(--accent)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:var(--accent);margin-bottom:6px}
.subtitle{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px}
.label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.field{margin-bottom:16px}
.input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:13px 44px 13px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.15s}
.input:focus{border-color:var(--accent)}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px}
.btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:all 0.15s}
.btn:hover{box-shadow:0 4px 20px rgba(232,255,61,0.3)}
.btn:disabled{opacity:0.5;cursor:default}
.error{color:var(--red);font-family:'DM Mono',monospace;font-size:11px;margin-top:8px;display:none}
.success{text-align:center;display:none}
.success-icon{font-size:52px;margin-bottom:16px}
.success-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--accent);margin-bottom:10px}
.success-msg{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:24px}
.btn-secondary{width:100%;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:13px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer}
.invalid{text-align:center;display:none}
.invalid-icon{font-size:48px;margin-bottom:16px}
.invalid-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--muted);margin-bottom:10px}
.invalid-msg{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:24px}
</style>
</head>
<body style="background:#0a0a0a">

<div class="card" id="card">
  <div class="logo">FORGE</div>
  <div class="subtitle">Reset your password</div>

  <!-- Reset form -->
  <div id="form-view">
    <div class="field">
      <div class="label">New Password</div>
      <div class="pw-wrap">
        <input class="input" type="password" id="new-password" placeholder="Min. 6 characters">
        <button class="pw-toggle" onclick="togglePw('new-password',this)" type="button">👁</button>
      </div>
    </div>
    <div class="field">
      <div class="label">Confirm Password</div>
      <div class="pw-wrap">
        <input class="input" type="password" id="confirm-password" placeholder="Repeat new password">
        <button class="pw-toggle" onclick="togglePw('confirm-password',this)" type="button">👁</button>
      </div>
    </div>
    <div class="error" id="form-error"></div>
    <button class="btn" id="submit-btn" onclick="submitReset()">Set New Password</button>
  </div>

  <!-- Success -->
  <div class="success" id="success-view">
    <div class="success-icon">✓</div>
    <div class="success-title">Password Updated</div>
    <div class="success-msg">Your password has been reset successfully. Sign in with your new password.</div>
    <button class="btn" onclick="goToSignIn()">Sign in</button>
  </div>

  <!-- Invalid/expired link -->
  <div class="invalid" id="invalid-view">
    <div class="invalid-icon">⚠️</div>
    <div class="invalid-title">Link Expired</div>
    <div class="invalid-msg">This reset link has expired or already been used. Request a new one from the sign in page.</div>
    <button class="btn" onclick="goToSignIn()">Back to sign in</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ozhtiqoregcwxkkxohbk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96aHRpcW9yZWdjd3hra3hvaGJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NjAxMTAsImV4cCI6MjA5MDMzNjExMH0.DrrZLUgLgtBTfSrhDC_acZ48ZrKQdqltBfAi_0-aTeI';

let _resetToken = null;

// Read token from URL hash — Supabase sends #access_token=...&type=recovery
(function() {
  const hash = window.location.hash.replace('#', '');
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  const type = params.get('type');
  if (token && type === 'recovery') {
    _resetToken = token;
    history.replaceState(null, '', location.pathname);
  } else {
    // No valid token — show invalid view
    document.getElementById('form-view').style.display = 'none';
    document.getElementById('invalid-view').style.display = 'block';
  }
})();

function togglePw(id, btn) {
  const input = document.getElementById(id);
  const show = input.type === 'password';
  input.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}

function showError(msg) {
  const el = document.getElementById('form-error');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

async function submitReset() {
  const newPw = document.getElementById('new-password').value;
  const confirmPw = document.getElementById('confirm-password').value;

  if (!newPw || newPw.length < 6) return showError('Password must be at least 6 characters.');
  if (newPw !== confirmPw) return showError('Passwords do not match.');
  showError('');

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const res = await fetch(SUPABASE_URL + '/auth/v1/user', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + _resetToken
      },
      body: JSON.stringify({ password: newPw })
    });
    const data = await res.json();

    if (!res.ok || data.error) {
      btn.disabled = false;
      btn.textContent = 'Set New Password';
      const msg = data.error?.message || data.msg || 'Failed to reset. The link may have expired.';
      showError(msg);
      return;
    }

    // Success
    document.getElementById('form-view').style.display = 'none';
    document.getElementById('success-view').style.display = 'block';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Set New Password';
    showError('Connection error. Please try again.');
  }
}

function goToSignIn() {
  window.location.href = '/';
}
</script>
</body>
</html>
